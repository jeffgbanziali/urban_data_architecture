server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Toutes les routes inconnues retombent sur index.html : c'est React Router
    # (côté client) qui décide ensuite quelle page afficher.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fichiers statiques : cache long, ils sont versionnés par hash dans leur nom.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
